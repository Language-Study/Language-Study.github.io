<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#c55a11">
    <title>Reset Password</title>
    <link rel="icon" type="image/png" href="icons/globe-solid.png">
    <link rel="manifest" href="manifest.json" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js" defer></script>
    <script src="js/config.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/ui-utils.js" defer></script>
    <script src="js/pages/info-update-page.js" defer></script>
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="auth-shell w-full max-w-md mx-4">
        <div class="bg-white rounded-lg shadow p-6 sm:p-8 space-y-6">
            <header class="text-center space-y-2">
                <p class="text-xs font-semibold uppercase tracking-[0.2em] text-gray-500">Account recovery</p>
                <h1 class="text-2xl sm:text-3xl font-bold text-gray-900">Reset your password</h1>
                <p class="text-sm text-gray-500">Use the email link flow to update your account access.</p>
            </header>
            <div id="resetPasswordMsg" class="text-sm text-center"></div>
            <form id="resetPasswordForm" class="space-y-4">
                <input type="password" id="newPassword" placeholder="Enter new password" required
                    class="w-full px-4 py-3 bg-white border border-gray-300 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <button type="submit"
                    class="w-full bg-blue-500 text-white py-3 px-4 rounded-full hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    Reset Password
                </button>
            </form>
            <div class="flex flex-col gap-2 pt-2 text-center">
                <a href="index.html" class="text-blue-500 hover:text-blue-600 font-medium">Back to site</a>
                <a href="privacy-policy.html" class="text-xs text-gray-500 hover:text-gray-700">Privacy Policy</a>
            </div>
        </div>
    </div>
</body>

</html>
